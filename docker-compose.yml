version: '3.8'

services:
  # Load Balancer Service
  load-balancer:
    build:
      context: ./load-balancer
      dockerfile: Dockerfile
    container_name: load-balancer
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    networks:
      - lb-network
    depends_on:
      - server1
      - server2
      - server3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend Server 1
  server1:
    build:
      context: ./servers
      dockerfile: Dockerfile
    container_name: server1
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - SERVER_ID=server-1
      - NODE_ENV=production
    networks:
      - lb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend Server 2
  server2:
    build:
      context: ./servers
      dockerfile: Dockerfile
    container_name: server2
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - SERVER_ID=server-2
      - NODE_ENV=production
    networks:
      - lb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend Server 3
  server3:
    build:
      context: ./servers
      dockerfile: Dockerfile
    container_name: server3
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - SERVER_ID=server-3
      - NODE_ENV=production
    networks:
      - lb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Dashboard Service
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
    networks:
      - lb-network
    depends_on:
      - load-balancer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  lb-network:
    driver: bridge
