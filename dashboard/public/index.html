<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Balancer Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .algorithm-selector {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .algorithm-btn {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .algorithm-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .algorithm-btn.active {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .server-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .server-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .server-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .server-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            font-size: 0.95em;
        }

        .metric-label {
            color: #666;
        }

        .metric-value {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .load-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
        }

        .load-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .requests-section {
            grid-column: 1 / -1;
        }

        .requests-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .request-item {
            background: #f5f7fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.2s ease-out;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 15px;
            align-items: center;
        }

        .request-id {
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            background: white;
            padding: 5px 10px;
            border-radius: 3px;
        }

        .request-info {
            flex: 1;
        }

        .request-info p {
            margin: 3px 0;
            font-size: 0.9em;
            color: #666;
        }

        .request-time {
            text-align: right;
            font-size: 0.85em;
            color: #999;
        }

        .request-server {
            font-weight: bold;
            color: #764ba2;
            background: white;
            padding: 5px 10px;
            border-radius: 3px;
            white-space: nowrap;
        }

        .control-section {
            grid-column: 1 / -1;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .no-requests {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .load-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .load-low {
            background: #4caf50;
        }

        .load-medium {
            background: #ff9800;
        }

        .load-high {
            background: #f44336;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .server-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat-box {
            background: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-label {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #667eea;
            font-weight: bold;
            font-size: 1.3em;
        }

        .scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #667eea #f1f1f1;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚖️ Load Balancer Dashboard</h1>

        <div class="main-grid">
            <!-- Algorithm Selector -->
            <div class="card">
                <h2>Algorithm</h2>
                <div class="metric">
                    <span class="metric-label">Current Algorithm:</span>
                    <span class="metric-value" id="currentAlgorithm">Round Robin</span>
                </div>
                <div class="algorithm-selector">
                    <button class="algorithm-btn active" onclick="switchAlgorithm('round-robin')">
                        🔄 Round Robin
                    </button>
                    <button class="algorithm-btn" onclick="switchAlgorithm('least-connection')">
                        📊 Least Connection
                    </button>
                </div>
            </div>

            <!-- Status -->
            <div class="card">
                <h2>Status</h2>
                <div class="metric">
                    <span class="metric-label">
                        <span class="status"></span>System
                    </span>
                    <span class="metric-value" style="color: #4caf50;">Healthy</span>
                </div>
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="stat-label">Total Requests</div>
                        <div class="stat-value" id="totalRequests">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Avg Response</div>
                        <div class="stat-value" id="avgResponse">0ms</div>
                    </div>
                </div>
            </div>

            <!-- Servers Load -->
            <div class="card" style="grid-column: 1 / -1;">
                <h2>Server Load</h2>
                <div class="server-grid" id="serverGrid">
                    <!-- Populated by JavaScript -->
                </div>
            </div>

            <!-- Requests Log -->
            <div class="card requests-section">
                <h2>Request Log</h2>
                <div class="controls">
                    <button class="btn btn-primary" onclick="sendRequest()">📤 Send Request</button>
                    <button class="btn btn-secondary" onclick="clearRequests()">🗑️ Clear Log</button>
                </div>
                <div class="requests-list scrollbar" id="requestsList">
                    <div class="no-requests">No requests yet. Click "Send Request" to start.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        const LB_BASE = 'http://localhost:3000';
        let requests = [];
        let serverStats = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateServers();
            updateRequests();
            setInterval(updateServers, 1000);
            setInterval(updateRequests, 2000);
        });

        async function updateServers() {
            try {
                const response = await fetch(`${LB_BASE}/load`);
                const data = await response.json();
                serverStats = data;
                renderServers(data.servers);
                document.getElementById('currentAlgorithm').textContent = 
                    data.algorithm === 'round-robin' ? 'Round Robin' : 'Least Connection';
                updateAlgorithmButtons(data.algorithm);
            } catch (error) {
                console.error('Error updating servers:', error);
            }
        }

        async function updateRequests() {
            try {
                const response = await fetch(`${LB_BASE}/history`);
                const data = await response.json();
                renderRequests(data.history);
                updateStats(data.history);
            } catch (error) {
                console.error('Error updating requests:', error);
            }
        }

        function renderServers(servers) {
            const grid = document.getElementById('serverGrid');
            const maxConnections = Math.max(...servers.map(s => s.activeConnections || 0), 5);

            grid.innerHTML = servers.map(server => {
                const load = server.activeConnections || 0;
                const loadPercent = (load / maxConnections) * 100;
                let loadColor = 'load-low';
                
                if (loadPercent > 66) loadColor = 'load-high';
                else if (loadPercent > 33) loadColor = 'load-medium';

                return `
                    <div class="server-card">
                        <div class="server-name">${server.id}</div>
                        <div class="metric">
                            <span class="metric-label">Active Connections:</span>
                            <span class="metric-value">${load}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Total Requests:</span>
                            <span class="metric-value">${server.totalRequests || 0}</span>
                        </div>
                        <div class="load-bar">
                            <div class="load-fill" style="width: ${Math.min(loadPercent, 100)}%"></div>
                        </div>
                        <div style="margin-top: 8px; font-size: 0.85em; color: #666;">
                            <span class="load-indicator ${loadColor}"></span>
                            ${Math.round(loadPercent)}% Load
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRequests(requestList) {
            const list = document.getElementById('requestsList');
            
            if (!requestList || requestList.length === 0) {
                list.innerHTML = '<div class="no-requests">No requests yet. Click "Send Request" to start.</div>';
                return;
            }

            list.innerHTML = requestList.slice(-20).reverse().map(req => {
                const time = new Date(req.timestamp).toLocaleTimeString();
                return `
                    <div class="request-item">
                        <span class="request-id">#${req.requestId}</span>
                        <div class="request-info">
                            <p><strong>Server:</strong> ${req.serverId}</p>
                            <p><strong>Algorithm:</strong> ${req.algorithm === 'round-robin' ? '🔄 Round Robin' : '📊 Least Connection'}</p>
                        </div>
                        <div class="request-server">${req.responseTime}ms</div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(requestList) {
            const total = requestList.length;
            const avg = total > 0 ? Math.round(requestList.reduce((sum, r) => sum + r.responseTime, 0) / total) : 0;
            
            document.getElementById('totalRequests').textContent = total;
            document.getElementById('avgResponse').textContent = avg + 'ms';
        }

        async function sendRequest() {
            try {
                const response = await fetch(`${LB_BASE}/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await response.json();
                
                console.log('Request sent:', data);
                setTimeout(updateRequests, 500);
            } catch (error) {
                console.error('Error sending request:', error);
                alert('Error sending request. Make sure load balancer is running.');
            }
        }

        async function switchAlgorithm(algorithm) {
            try {
                const response = await fetch(`${LB_BASE}/algorithm/${algorithm}`, {
                    method: 'POST'
                });
                const data = await response.json();
                console.log('Algorithm switched:', data);
                updateServers();
            } catch (error) {
                console.error('Error switching algorithm:', error);
            }
        }

        function updateAlgorithmButtons(algorithm) {
            document.querySelectorAll('.algorithm-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            const buttons = document.querySelectorAll('.algorithm-btn');
            if (algorithm === 'round-robin') {
                buttons[0].classList.add('active');
            } else {
                buttons[1].classList.add('active');
            }
        }

        function clearRequests() {
            fetch(`${LB_BASE}/reset`, { method: 'POST' })
                .then(() => {
                    updateRequests();
                    updateServers();
                })
                .catch(error => console.error('Error clearing requests:', error));
        }
    </script>
</body>
</html>
